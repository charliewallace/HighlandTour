<!-- 
=== Click Tour Engine to implement online tours. ===
Created by Charles L. Wallace of Carlsbad, CA, USA.

This tour implementation is intended to be used as a template for other tours.
It implements a sequence of views together with navigation controls that let you change between views. 

Clickable controls are provided allowing the user to turn right, left, turn around, look up/down, move forward.
When you click these, a new image is retreived and displayed.
You can open/close a door and "zoom in". 
There's also a "back" control that mainly works like an escape, to "zoom back" after zooming in. 
You can step thru a sequence of images taken at a single location with next/previous buttons.
You can look at family history photos taken in a given location by clicking "later" and "earlier" buttons.

The mapping that defines the tour is provided in tour_links.js, via initialization of a 
javascript variable "embeddedData".  The tour config is provided in tour_config.js; this provides 
page title, meta description, home index, and other tour-specific data.

In tour_links.js, you'll see a line for each view; these begin with an id number, followed by
an optional image file name in quotes, and a list of links to other images, each preceded by a single-letter
operator that defines the direction of the link.  Here is a list of the possible link operators:

l = left
f = forward
r = right
a = turn around
z = zoom in
b = back from zoom mode
o = open door
c = close door
u = up
d = down
n = next in sequence
p = previous in sequence
q = shift to right without changing heading (use when zoomed)
w = shift to left without changing heading (use when zoomed)
j = "jump" to later in time, at the current location
e = earlier in time, at the current location
'=' = user-defined. A descrip is required in parens, followed by the destination location id. 

The name of the image to be displayed can be provided immediately after the id number in dbl quotes; 
but this is optional. If no name is present, the image name will be constructed by pre-pending 
"P0001" to the image id number.  This takes advantage of the auto filenames generated by a camera.  
The prefix is defined in the links file by a line starting with "+"; see variable "ImageFilePrefix".

After each image line, one or more description lines (starting with a non-numeric character) are allowed. 
These are optional. The first description line will appear at the top, above the image; all the following 
lines will appear at the bottom.

The "Info" page can be reached via the Info button, only shown on the "Home" page, which is where the 
tour starts. The "Home" button navigates back to the home page. A description of the tour and how it 
works is shown in the Info page. For this tour, it also provides a selection of shortcut links. 

If desired, you can use the "user defined" link feature to link together related images in small 
sets, for example good portraits of family members.  This is intended to make it easier to find the family 
history images.  

PERFORMANCE NOTES: I found that when being served from a slow server, there sometimes was an unacceptably 
long delay in showing an image.  Therefore I added the SmallImages folder, where smaller, lower-quality 
versions of all tour images are provided, including each of the image subfolders.  If enabled, these small 
images are shown initially when going to a new location, then when display is complete, a larger better-quality 
image is shown.  This is not usually perceptible. For landscape images, the small versions are 900px tall; 
for portrait, they are 800px wide.  I used photoshop's "SaveForWeb" feature to save these with a low jpg quality, 
resulting in much reduced file size.  To enable this feature, set "UseSmallImages" to true in tour_config.js.
To use only the small images, set "UseSmallImages" to true and "UseLargeImages" to false in tour_config.js.
To use only the large images, set "UseSmallImages" to false and "UseLargeImages" to true in tour_config.js.
To use both, set "UseSmallImages" to true and "UseLargeImages" to true in tour_config.js.

-->

  <script>

    // all global vars are capitalized
    const AppVersion = "v0.1.0";
    var TourConfig = window.TourConfig || {};
    var HomeIndex = TourConfig.HomeIndex || 231;
    var ImageFilePrefix = "P0001";
    var TheIndex = HomeIndex;
    var TheOldIndex = -1;
    var TheRec;
    var OldRec = TheRec;
    var TheDescrip = TourConfig.DefaultDescrip || "Wallace Tour";
    var TheVerboseDescrip = TourConfig.DefaultVerboseDescrip || "Highland Ave, Solana Beach, CA";
    var ImageName = "";
    var UserDefLinkName = "";
    var IntervalId = 0;
    var IntervalCount = 0;
    var InZipState = false;
    var SmallImagesOnly = true;
    var LargeImagesOnly = false;


    //----------------------------------------------------------
    function doInfo() {
      const theInfoElement = document.getElementById('infoPage');
      const theMainElement = document.getElementById('mainTable');

      theInfoElement.style.display = "";
      theMainElement.style.display = "none";
    }

    //----------------------------------------------------------
    function doExit() {
      const theInfoElement = document.getElementById('infoPage');
      const theMainElement = document.getElementById('mainTable');

      theInfoElement.style.display = "none";
      theMainElement.style.display = "";
    }



    //----------------------------------------------------------
    // Jump to the passed index
    function doJumpToIndex(destIndex) {
      doExit();
      if (destIndex > 0 && destIndex < 999) {
        TheIndex = destIndex;
        TheRec = lookupData(TheIndex);  // Look up the new links record.
        if (TheRec != null) {
          setNavControlsVisibility();
        }
      }
      // first, hide the old image.
    }


    //----------------------------------------------------------
    function doNav(dirChar) {

      TheOldIndex = TheIndex;
      OldRec = TheRec;
      if (dirChar == 'g')  // user clicked "Home"
      {
        TheIndex = HomeIndex;
      }
      TheRec = lookupData(TheIndex);
      var theField;
      var ii = 0;
      var firstChar = '';
      var link = "";
      var linkVal = 0;

      //window.alert("doNav(" + dirChar + ") = " + TheRec);

      // Search current (not new) rec to see where we need to go
      for (ii = 0; ii < TheRec.length; ii++) {
        theField = TheRec[ii].trim();
        //window.alert("In doRight(), theField = " + theField);
        firstChar = theField.charAt(0); // get first char
        //window.alert("In doRight(), first char = " + firstChar);

        if (firstChar == dirChar) { // Check if we found the passed direction char
          // we found the dirChar.  Now grab the rest of the field; it's the new loc index.
          link = theField.slice(1); // Return the link
          //window.alert("link = " + link);

          // Ususally the chars following the dirChar consist of the new link index.
          // but we also allow a user-defined link name, in parens, if the dirChar is '=' or 'x'.
          // ATTN: the string in the parens may contain a space, causing it to be split into
          // multiple fields by the call to split used to create TheRec.
          // we have to scan thru them until a closing paren is found. Here, we discard the name,
          // all we need is the portion following the closing paren.
          // For '=' there's a location index after the closing paren; 
          // for 'x' there's a URL in quotes.
          UserDefLinkName = "";
          if (dirChar == '=' || dirChar == 'x') {
            // strip off the user defined link name.
            // NOTE that we don't care about the user def name in parens, since
            // we are leaving this page. All that matters is the link index.
            var closingParenIndex = link.indexOf(")");
            if (closingParenIndex == -1) {
              for (var jj = ii + 1; jj < TheRec.length; jj++) {
                theField = TheRec[jj].trim();
                link = theField.slice(1);
                closingParenIndex = link.indexOf(")");
                if (closingParenIndex != -1) {
                  break;
                }
              }
            }
            if (closingParenIndex != -1) {
              // grab portion of the line following the closing paren
              link = link.slice(closingParenIndex + 1);
              //window.alert("User def index=" + link);
            }
            else {
              window.alert("Bad link syntax in user defined link. Link line = " + theField);
            }
          }
          // at this point, link contains the portion of the field following the closing paren.

          if (dirChar == 'x') {
            // link should contain a url in quotes.
            link = link.slice(1, link.length - 1);
            window.open(link, "_blank");  // open in a new tab

            // after opening the new tab, we should stay in the current page of the old tab.        
            //theImageElem.style.display = ""; // restore visibility of the image
            return;
          }
          else // link should contain the destination index
          {
            linkVal = parseInt(link);
            if (linkVal > 0 && linkVal < 10000) {
              TheOldIndex = TheIndex;
              TheIndex = linkVal;

              if (ImagesIdx[linkVal] !== undefined) {
                ImageName = "ImagesSmall/" + ImagesIdx[linkVal] + ".jpg";
              }
              else {
                window.alert("Error for x tag: ImagesIdx[" + linkVal + "] contents undefined.");
                ImageName = "";
              }
              //window.alert("image name = " + ImageName);

              break;
            }
            else {
              // invalid link id
              linkVal = -1;
            }
          }
        } // end of for
      }

      if (linkVal == -1) {
        window.alert("Invalid link found. link = " + link);
      }

      if (TheIndex != TheOldIndex) { // a new index was found
        // OK! We have a new index, now use it to get the new rec
        TheRec = lookupData(TheIndex);  // Look up the new links record.
        if (TheRec != null) {
          setNavControlsVisibility();
        }
      }

    }



    //----------------------------------------------------------
    // Set the visibility of navigation conttrols based on global links record TheRec.
    //
    function setNavControlsVisibility() {

      var quotedImageName = "";
      var userDefinedLinkLabel = "";
      var link = "";

      theDescripElement = document.getElementById('descriptionElement');
      theDescripElement.innerHTML = TheDescrip;

      theVerboseDescripElem = document.getElementById('verboseDescripElem');
      theVerboseDescripElem.innerHTML = TheIndex.toString() + ":&nbsp;" + TheVerboseDescrip;

      var foundDblQuote = false;
      var foundH = false;
      var theHeading = "";
      var foundR = false;
      var foundL = false;
      var foundF = false;
      var foundB = false;
      var foundA = false;
      var foundO = false;
      var foundC = false;
      var foundU = false;
      var foundD = false;
      var foundW = false;
      var foundQ = false;
      var foundZ = false;
      var foundE = false;
      var foundJ = false;
      var foundN = false;
      var foundP = false;
      var foundEqual = false;
      var foundX = false;
      var openingParenIndex = -1;
      var closingParenIndex = -1;
      var ii, jj;



      if (TheRec != null) {
        // Search the new rec to see which nav controls should be displayed
        for (ii = 0; ii < TheRec.length; ii++) {
          theField = TheRec[ii].trim();
          firstChar = theField.charAt(0); // get first char

          switch (firstChar) {
            case '\"': // opening dbl quote of optional imageName
              foundDblQuote = true;
              quotedImageName = theField.slice(1, theField.length - 1) + ".jpg"; // remove the quotes
              //window.alert("quoted filename = " + quotedImageName);
              break;

            case '=': // user defined button, format (label)NNN 
              foundEqual = true;
              // TODO: need to extract the user defined link name from the parens, and apply it to button.
              // NOTE that the link name may contain spaces, so could span multiple fields.
              // We don't care about the index following the closing paren, that won't matter until
              // the button is clicked.

              link = theField.slice(1); // trim off the '='
              openingParenIndex = link.indexOf("(");
              if (openingParenIndex == -1) {
                window.alert("Bad user-defined link syntax, no open paren for index=" + TheIndex);
                break;
              }

              closingParenIndex = link.indexOf(")");
              if (closingParenIndex == -1) // scanning across multiple fields is needed
              {
                userDefinedLinkLabel = link.slice(openingParenIndex + 1);
                //window.alert("UserDef link label part 1 = " + userDefinedLinkLabel);
                for (jj = ii + 1; jj < TheRec.length; jj++) {
                  link = TheRec[jj].trim();
                  closingParenIndex = link.indexOf(")");
                  if (closingParenIndex != -1) // this is the last field
                  {
                    userDefinedLinkLabel += " " + link.slice(0, closingParenIndex);
                    break;
                  }
                  else {
                    userDefinedLinkLabel += link;
                  }
                }
                //window.alert("UserDef link multi part = " + userDefinedLinkLabel);
              }
              else // open and close parens are in the same field
              {
                userDefinedLinkLabel = link.slice(openingParenIndex + 1, closingParenIndex);
                //window.alert("UserDef link label one piece = " + userDefinedLinkLabel);
              }
              //--------
              break;

            case 'x': // user defined external url button, format (label)"url.htm"
              foundX = true;
              // TODO: need to extract the user defined url name from the parens, and apply it to button.
              // NOTE that the link name may contain spaces, so could span multiple fields.
              // We don't care about the url following the closing paren, that won't matter until
              // the button is clicked.

              link = theField.slice(1); // trim off the 'x'
              openingParenIndex = link.indexOf("(");
              if (openingParenIndex == -1) {
                window.alert("Bad user-defined URL syntax, no open paren for index=" + TheIndex);
                break;
              }

              closingParenIndex = link.indexOf(")");
              if (closingParenIndex == -1) // scanning across multiple fields is needed
              {
                userDefinedLinkLabel = link.slice(openingParenIndex + 1);
                //window.alert("UserDef link label part 1 = " + userDefinedLinkLabel);
                for (jj = ii + 1; jj < TheRec.length; jj++) {
                  link = TheRec[jj].trim();
                  closingParenIndex = link.indexOf(")");
                  if (closingParenIndex != -1) // this is the last field
                  {
                    userDefinedLinkLabel += " " + link.slice(0, closingParenIndex);
                    break;
                  }
                  else {
                    userDefinedLinkLabel += link;
                  }
                }
                //window.alert("UserDef link multi part = " + userDefinedLinkLabel);
              }
              else // open and close parens are in the same field
              {
                userDefinedLinkLabel = link.slice(openingParenIndex + 1, closingParenIndex);
                //window.alert("UserDef link label one piece = " + userDefinedLinkLabel);
              }
              //--------
              break;


            case 'h': // heading
              foundH = true;
              // grab the heading - remove the first char
              theHeading = theField.slice(1).toUpperCase();
              break;
            case 'r': // turn right
              foundR = true;
              break;
            case 'l': // turn left
              foundL = true;
              break;
            case 'f': // fwd
              foundF = true;
              break;
            case 'b': // back (esc)
              foundB = true;
              break;
            case 'a':  // turn around
              foundA = true;
              break;
            case 'o': // open
              foundO = true;
              break;
            case 'c': // close
              foundC = true;
              break;
            case 'u': // up
              foundU = true;
              break;
            case 'd': // down
              foundD = true;
              break;
            case 'w': // shift left 
              foundW = true;
              break;
            case 'q': // shift right
              foundQ = true;
              break;
            case 'z': // zoom in
              foundZ = true;
              break;
            case 'e': // earlier
              foundE = true;
              break;
            case 'j': // later

    //-------------------------------------------------------
    // Lookup arrays used for quick access to tour data.
    // NOTE: Sparse array usage. If uninit member accessed, returns "undefined"
    const IdxLen = 1000;
    const LinksIdx = new Array(IdxLen);
    const DescIdx = new Array(IdxLen);
    const VerboseIdx = new Array(IdxLen);
    const ImagesIdx = new Array(IdxLen);


    //============================================================================================
    function buildLookupIndex() {
      const start = performance.now();
      var index = -1;
      var field = "";
      var firstSpaceIdx = -1;
      var firstChar = '';
      var theLine = "";
      var descrLine = "";
      var verboseDesc = "";
      var imageFilename = "";

      var lines = embeddedData.split("\n"); // Split data into lines
      for (var ii = 0; ii < lines.length; ii++) { //10; ii++) { //
        theLine = lines[ii].trim();
        var parts = theLine.split(" "); // Split each line into fields

        //console.log("In buildLookupIndex(), theLine = " + theLine);
        firstChar = theLine[0];
        if (firstChar >= '0' && firstChar <= '9') {
          // the line starts with a digit, treat it as a link line

          firstSpaceIdx = theLine.indexOf(" ");
          //field = theLine.slice(0, firstSpaceIdx);
          field = parts[0];
          //console.log("Extracted index as string = >" + field + "<");
          index = parseInt(field);
          //console.log("Index as int = " + index);

          if (index >= 0 && index < 1000) {

            // TODO check if this index is already used; if so show warning but proceed 
            if (LinksIdx[index] !== undefined) {
              window.alert("Warning - line " + ii + ": LinksIdx[" + index + "] already used, contains " + LinksIdx[index]);
            }

            // save the link line (not including the first field) into the LinksIdx based on the extracted index.  
            //  This enables sparse-array lookup for speed.
            LinksIdx[index] = theLine.slice(firstSpaceIdx + 1);
            //console.log("LinksIdx[" + index + "] = >" + LinksIdx[index] + "<");

            //------------ now determine the image filename for this link line.

            // Create default image filename based on the index; this can be superceded 
            //  if the destination link line includes a quoted string = image name but without the .jpg
            ImagesIdx[index] = ImageFilePrefix + field;  // don't include the .jpg, will add later.

            // Check if a quoted filename is provided; if so, it supercedes the index-based name.
            // Must be the second field of the link line. May include folder name.
            field = parts[1].trim();

            firstChar = field.charAt(0); // get first char

            if (firstChar == '\"') { // opening dbl quote of optional imageName
              if (field.charAt(field.length - 1) != '\"') {
                window.alert("Warning - bad link like syntax for index = " + index + ". Closing dbl quote missing.");
              }

              // SUPERCEDE the index-based filename
              ImagesIdx[index] = field.slice(1, field.length - 1) // remove the quotes
            }

            // check the next line; if starts with non-numeric char treat as Optional description
            if (ii < lines.length - 1) {
              descrLine = lines[ii + 1].trim();
              firstChar = descrLine[0];
              if ((firstChar >= '0' && firstChar <= '9') || firstChar == '#') {
                DescIdx[index] = "";
                continue;  // no descrip found; no need to check for verbose descrip
              }
              else {
                DescIdx[index] = descrLine;
              }
              ii += 1;  // <<<<<<<<<< s line in lines[]

              // scan for lines starting with non-digit, treat as verbose descrip 
              verboseDesc = "";
              if (ii < lines.length - 1) {
                //console.log("extract verbose text. ii=" + ii);
                for (var jj = ii + 1; jj < lines.length; jj++) {
                  var nextLine = lines[jj].trim();
                  //console.log(nextLine);
                  var firstChar = nextLine[0];
                  if ((firstChar >= '0' && firstChar <= '9') || firstChar == '#') {
                    break;
                  }
                  verboseDesc += nextLine;
                  ii += 1; // <<<<<<<<<< advance to next line in lines[]
                }
              }
              //console.log("Verbose = >" + verboseDesc + "<");

              VerboseIdx[index] = verboseDesc;
            }
          }
          else {
            window.alert("Illegal link in buildLookupIndex() = " + index);
          }
        }
        if (index == -1) {
          continue;  // should only happen when the first line of embeddedData starts with non numeric
        }
      }

      //console.log("Test of uninit array access. DescIdx[200] = >" + DescIdx[200] + "<");

      const end = performance.now();
      //console.log(`Execution time: ${end - start} ms`);
      return (end - start);
    }



    //------------------------------------------
    // Function to lookup data by index 
    // Fetches the string of link info saved for the passed index,
    // splits it up into an array of fields, and returns the array.
    function lookupData(index) {

      if (index < 0 || index > IdxLen - 1) {
        window.alert("in lookupData(), illegal index received = " + index);
        return null;
      }

      var theLine = LinksIdx[index];
      if (theLine === undefined) {
        return null;
      }

      var parts = theLine.split(" "); // Split each line into fields

      TheDescrip = DescIdx[index];
      if (TheDescrip === undefined) {
        TheDescrip = "";
      }

      TheVerboseDescrip = VerboseIdx[index];
      if (TheVerboseDescrip === undefined) {
        TheVerboseDescrip = "";
      }

      return parts;

    }

    //----------------------------------------------------------
    // If the user exits fullscreen mode by meass other than clicking the "shrink"
    // button (like clicking ESC or the little "x" that appears when mouse hits top)
    // we miss the opportunity to revert the button label toe 'Expand'.  So this
    // event handler does it for us in that case.  
    document.addEventListener("fullscreenchange", (event) => {
      //window.alert("fullscreenchange!");
      if (!document.fullscreenElement) {
        // exiting full screen mode
        var button = document.getElementById("fullscreenButton");
        button.innerHTML = "Expand";
      }
    });


    //----------------------------------------------------------
    function toggleFullscreen() {

      var button = document.getElementById("fullscreenButton");
      var elem = document.documentElement;
      if (!document.fullscreenElement) {
        button.innerHTML = "Shrink";
        if (elem.requestFullscreen) {
          elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) { /* Safari */
          elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) { /* IE11 */
          elem.msRequestFullscreen();
        }
      } else {
        button.innerHTML = "Expand";
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) { /* Safari */
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) { /* IE11 */
          document.msExitFullscreen();
        }
      }
    };
